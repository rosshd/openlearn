name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  verify:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: distributions
          path: dist/

      - name: Verify wheel version
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .release-venv
          .release-venv/bin/python -m pip install dist/*.whl

          package_version=$(
            .release-venv/bin/python -c \
              "import openlearn; print(openlearn.__version__)"
          )
          cli_output=$(.release-venv/bin/openlearn --version)
          tag_version="${GITHUB_REF_NAME#v}"

          [[ "$cli_output" == *"$package_version"* ]]
          [[ "$package_version" == "$tag_version" ]]

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
