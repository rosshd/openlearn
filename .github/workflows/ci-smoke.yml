name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest -v

      - name: Run smoke tests (mocked)
        env:
          OPENLEARN_MOCK: '1'
          OPENLEARN_HOME: ${{ runner.temp }}/openlearn-smoke
        run: |
          chmod +x manual-tests/smoke-full.sh
          ./manual-tests/smoke-full.sh --mock
